<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    .project-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)) !important;
      gap: 3rem !important;
      justify-content: center;
    }
    .project-grid .project-item {
      display: block !important;
      width: auto !important;
      flex: none !important;
      max-width: none !important;
    }
    .project-content {
      padding: 2.5rem !important;
    }
  </style>
</head>
<body>
  <section class="project-grid">
    <div class="project-item">
      <div class="project-content">
        <h3>Resume</h3>
        <a class="btn btn-outline-primary btn-sm" href="/assets/documents/resume.pdf" target="_blank">View Resume</a>
      </div>
    </div>
    <div class="project-item">
      <div class="project-content">
        <h3>Student Stress Analysis</h3>
        <a class="btn btn-outline-primary btn-sm" href="/assets/documents/student-stress-analysis.pdf" target="_blank">View Report</a>
      </div>
    </div>
    <div class="project-item">
      <div class="project-content">
        <h3>Valet System</h3>
        <a class="btn btn-outline-primary btn-sm" href="/assets/documents/valet-systems.pdf" target="_blank">View PDF</a>
      </div>
    </div>
  </section>
</body>
</html>
