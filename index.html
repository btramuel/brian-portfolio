<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Portfolio
  </title>
  <style>
   .project-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(700x, 1fr)) !important;
      gap: 3rem !important;
      justify-content: center;
    }
    .project-grid .project-item {
      display: block !important;
      width: auto !important;
      flex: none !important;
      max-width: none !important;
    }
    .project-content {
      padding: 2.5rem !important;
    }
  </style>
 </head>
 <body>
  <section class="section">
   <div class="container">
    <h2>
     My Resume
    </h2>
    <!-- Shows PDF inside the page -->
    <iframe height="700px" src="/assets/documents/resume.pdf" style="border: 1px solid #ccc;" width="100%">
    </iframe>
    <br/>
    <br/>
    <!-- Opens PDF in a new tab -->
    <a class="btn" href="/assets/documents/resume.pdf" target="_blank">
     Download Resume PDF
    </a>
   </div>
  </section>
  <div class="project-item">
   <div class="project-content">
    <h3>
     Student Stress Analysis
    </h3>
    <a class="btn btn-outline-primary btn-sm" href="/assets/documents/student-stress-analysis.pdf" target="_blank">
     View Report
    </a>
   </div>
  </div>
  <div class="project-item">
   <div class="project-content">
    <h3>
     Valet System
    </h3>
    <a class="btn btn-outline-primary btn-sm" href="/assets/documents/valet-systems.pdf" target="_blank">
     View PDF
    </a>
   </div>
  </div>
 </body>
</html>
